name: Create Plugin Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # run once a month on the 1st day

# Uses a short-lived GitHub App token minted via Vault (create-github-app-token)
# so the action can open PRs that also modify workflow files. The token's scope is
# defined by the `Create Plugin Update` permission-set for this repo in
# grafana/deployment_tools (terraform/repositories/grafana-advisor-app/github-app-configs/config.yaml).

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Needed for create-github-app-token
      pull-requests: write
    steps:
      - id: get-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: grafana-plugins-platform-bot
      - uses: grafana/plugin-actions/create-plugin-update@b82357e85d512c678416146ca4e9f8672bd108da # create-plugin-update/v2.0.2
        with:
          token: ${{ steps.get-github-token.outputs.token }}
